<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
            <animate attributeName="x1" values="0%;20%;0%" dur="5s" repeatCount="indefinite" />
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#grad)" rx="15" />
    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" fill="white">
        Awesome Differential Privacy
        <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white">
        Privacy in AI: History, Progression, Variants &amp; Applications
    </text>
</svg>